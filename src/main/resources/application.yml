spring:
  application:
    name: AuthService
  datasource:
    url: jdbc:postgresql://localhost:5432/market_service
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_auth
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@stockapp.ru}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

server:
  port: 8081

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
  init-data:
    max-age-seconds: ${TELEGRAM_INIT_DATA_MAX_AGE:86400}

app:
  jwt:
    secret: ${JWT_SECRET:stockapp-change-this-secret-key-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    ru.tuganov: DEBUG
